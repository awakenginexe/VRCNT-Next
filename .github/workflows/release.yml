name: Release VRCNT-Next

on:
  push:
    tags:
      - 'v*' # Trigger when tag starts with 'v' (e.g. v3.0.0)
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to publish (for example, v3.0.0)'
        required: true
        type: string

jobs:
  release:
    name: Build and publish VRCNT-Next
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install dependencies
        run: npm install

      - name: Prefetch pinned CUDA wheel
        env:
          HF_XET_HIGH_PERFORMANCE: '1'
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check huggingface_hub==0.32.2 hf-xet==1.1.2

          $wheelName = "sherpa_onnx-1.13.0+cuda12.cudnn9-cp311-cp311-win_amd64.whl"
          $wheelDir = Join-Path $env:RUNNER_TEMP "vrcnt-cuda-wheel"
          New-Item -ItemType Directory -Path $wheelDir -Force | Out-Null
          $env:CUDA_WHEEL_DIR = $wheelDir

          $prefetchScript = @'
          import hashlib
          import os
          import shutil
          from pathlib import Path

          from huggingface_hub import hf_hub_download

          filename = "sherpa_onnx-1.13.0+cuda12.cudnn9-cp311-cp311-win_amd64.whl"
          expected_sha256 = "d05cffbd8df3d69f33b6665afcfefaf05d42e1c73038b2c6ba8118cfeac2a88e"
          source = Path(
              hf_hub_download(
                  repo_id="csukuangfj2/sherpa-onnx-wheels",
                  filename=f"cuda/1.13.0/{filename}",
              )
          )
          destination = Path(os.environ["CUDA_WHEEL_DIR"]) / filename
          shutil.copy2(source, destination)

          digest = hashlib.sha256()
          with destination.open("rb") as wheel:
              for chunk in iter(lambda: wheel.read(1024 * 1024), b""):
                  digest.update(chunk)

          actual_sha256 = digest.hexdigest()
          if actual_sha256 != expected_sha256:
              raise SystemExit(
                  f"CUDA wheel SHA-256 mismatch: expected {expected_sha256}, got {actual_sha256}"
              )
          print(f"Verified pinned CUDA wheel at {destination}")
          '@

          $prefetchMaxAttempts = 4
          for ($prefetchAttempt = 1; $prefetchAttempt -le $prefetchMaxAttempts; $prefetchAttempt++) {
            $prefetchScript | python -
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($prefetchAttempt -eq $prefetchMaxAttempts) {
              throw "CUDA wheel prefetch failed after $prefetchMaxAttempts attempts."
            }

            $delaySeconds = 30 * [Math]::Pow(2, $prefetchAttempt - 1)
            Write-Warning "CUDA wheel prefetch attempt $prefetchAttempt failed; retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

          $wheelPath = Join-Path $wheelDir $wheelName
          if (-not (Test-Path -LiteralPath $wheelPath)) {
            throw "Verified CUDA wheel was not found at $wheelPath."
          }
          "VRCNT_CUDA_WHEEL_PATH=$wheelPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python environment
        shell: pwsh
        run: |
          $maxAttempts = 4
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            npm run setup-python
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($attempt -eq $maxAttempts) {
              throw "Python environment setup failed after $maxAttempts attempts."
            }

            $delaySeconds = 30 * [Math]::Pow(2, $attempt - 1)
            Write-Warning "Python environment setup attempt $attempt failed; retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Install Python script dependencies
        run: pip install tqdm huggingface_hub==0.34.4

      - name: Read release configuration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        shell: pwsh
        run: |
          $tag = $env:INPUT_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = $env:GITHUB_REF -replace "^refs/tags/", ""
          }
          if ($tag -notmatch "^v[0-9]+\.[0-9]+\.[0-9]+$") {
            throw "Release tag '$tag' must use the vMAJOR.MINOR.PATCH format."
          }
          $version = $tag -replace "^v", ""
          $releaseConfig = Get-Content -Raw ./release.config.json | ConvertFrom-Json

          if (
            [string]::IsNullOrWhiteSpace($releaseConfig.githubOwner) -or
            [string]::IsNullOrWhiteSpace($releaseConfig.githubRepo) -or
            [string]::IsNullOrWhiteSpace($releaseConfig.hfRepoId) -or
            $releaseConfig.githubOwner -eq "OWNER_TODO" -or
            $releaseConfig.githubRepo -eq "REPO_TODO" -or
            $releaseConfig.hfRepoId -eq "HF_REPO_TODO"
          ) {
            throw "release.config.json still has placeholder GitHub or Hugging Face values."
          }

          if ([string]::IsNullOrWhiteSpace($env:HF_TOKEN)) {
            throw "HF_TOKEN secret is required to upload release files to Hugging Face."
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_OWNER=$($releaseConfig.githubOwner)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_REPO=$($releaseConfig.githubRepo)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HF_REPO_ID=$($releaseConfig.hfRepoId)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ZIP_NAME=$($releaseConfig.releaseAssetZipName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "LATEST_JSON_NAME=$($releaseConfig.latestJsonAssetName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_NAME_PATTERN=$($releaseConfig.installerNamePattern)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content -Raw ./package.json | ConvertFrom-Json).version
          if ($packageVersion -ne $env:VERSION) {
            throw "Tag $env:RELEASE_TAG does not match package.json version $packageVersion. Use tag v$packageVersion or update package.json intentionally."
          }

      - name: Build and package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run release

      - name: Locate release assets
        shell: pwsh
        run: |
          $installerName = $env:INSTALLER_NAME_PATTERN.Replace('${version}', $env:VERSION)
          $installer = Get-ChildItem -Path ./src-tauri/target/release/bundle/nsis -Filter $installerName -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            $installer = Get-ChildItem -Path ./src-tauri/target/release/bundle/nsis -Filter "*_x64-setup.exe" -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1
          }

          if (-not $installer) {
            Get-ChildItem -Path ./src-tauri/target/release/bundle -Recurse -ErrorAction SilentlyContinue
            throw "NSIS installer was not generated."
          }

          $zipPath = Join-Path (Get-Location) $env:RELEASE_ZIP_NAME
          if (-not (Test-Path $zipPath)) {
            Get-ChildItem -Path . -Filter "*.zip" -ErrorAction SilentlyContinue
            throw "Portable release zip $env:RELEASE_ZIP_NAME was not generated."
          }

          $signaturePath = "$($installer.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            Get-ChildItem -Path ./src-tauri/target/release/bundle/nsis -Recurse -ErrorAction SilentlyContinue
            throw "Updater signature was not generated for $($installer.Name). Ensure TAURI_SIGNING_PRIVATE_KEY is configured."
          }

          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_NAME=$($installer.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_SIGNATURE_PATH=$signaturePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_SIGNATURE_NAME=$($installer.Name).sig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate latest.json
        shell: pwsh
        run: |
          $signature = (Get-Content -Raw "$env:INSTALLER_SIGNATURE_PATH").Trim()
          $installerUrl = "https://huggingface.co/$env:HF_REPO_ID/resolve/$env:RELEASE_TAG/$env:INSTALLER_NAME"
          $latest = [ordered]@{
            version = $env:VERSION
            notes = "Release $env:RELEASE_TAG"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $installerUrl
              }
            }
          }
          $latestPath = Join-Path (Get-Location) $env:LATEST_JSON_NAME
          $latest | ConvertTo-Json -Depth 5 | Set-Content -Path $latestPath -Encoding utf8
          "LATEST_JSON_PATH=$latestPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VRCNT_INSTALLER_URL=$installerUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VRCNT_ZIP_URL=https://huggingface.co/$env:HF_REPO_ID/resolve/$env:RELEASE_TAG/$env:RELEASE_ZIP_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VRCNT_LATEST_JSON_URL=https://huggingface.co/$env:HF_REPO_ID/resolve/main/$env:LATEST_JSON_NAME" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release files to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: pwsh
        run: |
          $uploadDir = Join-Path (Get-Location) "hf_upload_temp"
          if (Test-Path $uploadDir) {
            Remove-Item -LiteralPath $uploadDir -Recurse -Force
          }
          New-Item -ItemType Directory -Path $uploadDir | Out-Null

          Copy-Item -LiteralPath "$env:RELEASE_ZIP_PATH" -Destination (Join-Path $uploadDir $env:RELEASE_ZIP_NAME)
          Copy-Item -LiteralPath "$env:INSTALLER_PATH" -Destination (Join-Path $uploadDir $env:INSTALLER_NAME)
          Copy-Item -LiteralPath "$env:INSTALLER_SIGNATURE_PATH" -Destination (Join-Path $uploadDir $env:INSTALLER_SIGNATURE_NAME)
          Copy-Item -LiteralPath "$env:LATEST_JSON_PATH" -Destination (Join-Path $uploadDir $env:LATEST_JSON_NAME)

          $script = @'
          import os
          from huggingface_hub import HfApi
          from huggingface_hub.errors import HfHubHTTPError, RevisionNotFoundError

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = os.environ["HF_REPO_ID"]
          release_tag = os.environ["RELEASE_TAG"]
          version = os.environ["VERSION"]

          try:
              api.repo_info(repo_id=repo_id, repo_type="model")
          except HfHubHTTPError as exc:
              raise SystemExit(f"Hugging Face repo {repo_id} is not accessible with HF_TOKEN: {exc}") from exc

          commit_info = api.upload_folder(
              repo_id=repo_id,
              repo_type="model",
              folder_path="hf_upload_temp",
              path_in_repo=".",
              commit_message=f"Release {release_tag}",
          )

          try:
              api.delete_tag(repo_id=repo_id, repo_type="model", tag=release_tag)
          except RevisionNotFoundError:
              pass

          api.create_tag(
              repo_id=repo_id,
              repo_type="model",
              tag=release_tag,
              revision=commit_info.oid,
              tag_message=f"Release {version}",
          )
          print(f"Uploaded release files to {repo_id} and tagged {release_tag} at {commit_info.oid}")
          '@

          $uploadMaxAttempts = 4
          for ($uploadAttempt = 1; $uploadAttempt -le $uploadMaxAttempts; $uploadAttempt++) {
            $script | python -
            if ($LASTEXITCODE -eq 0) {
              break
            }

            if ($uploadAttempt -eq $uploadMaxAttempts) {
              throw "Hugging Face upload failed after $uploadMaxAttempts attempts."
            }

            $delaySeconds = 30 * [Math]::Pow(2, $uploadAttempt - 1)
            Write-Warning "Hugging Face upload attempt $uploadAttempt failed; retrying in $delaySeconds seconds."
            Start-Sleep -Seconds $delaySeconds
          }

      - name: Verify Hugging Face release URLs
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer $env:HF_TOKEN" }
          $urls = @(
            $env:VRCNT_ZIP_URL,
            $env:VRCNT_INSTALLER_URL,
            "$env:VRCNT_INSTALLER_URL.sig",
            $env:VRCNT_LATEST_JSON_URL
          )

          foreach ($url in $urls) {
            $response = Invoke-WebRequest -Uri $url -Method Head -Headers $headers -MaximumRedirection 5 -UseBasicParsing
            if ($response.StatusCode -lt 200 -or $response.StatusCode -ge 400) {
              throw "Hugging Face URL check failed for $url with status $($response.StatusCode)"
            }
          }

      - name: Create or update GitHub Release page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = $env:RELEASE_TAG
          $notes = @"
          Release $tag

          Large release files are hosted on Hugging Face:
          - Installer: $env:VRCNT_INSTALLER_URL
          - Portable payload: $env:VRCNT_ZIP_URL
          - Updater manifest: $env:VRCNT_LATEST_JSON_URL
          "@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title $env:VERSION --draft=false --prerelease=false --notes "$notes"
          } else {
            gh release create $tag --title $env:VERSION --notes "$notes" --verify-tag
          }

          gh release upload $tag `
            "$env:INSTALLER_PATH" `
            "$env:INSTALLER_SIGNATURE_PATH" `
            "$env:LATEST_JSON_PATH" `
            --clobber
