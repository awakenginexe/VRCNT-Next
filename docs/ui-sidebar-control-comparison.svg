<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1b0b19"/>
      <stop offset="0.5" stop-color="#11111f"/>
      <stop offset="1" stop-color="#080913"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff5fa3"/>
      <stop offset="1" stop-color="#ff8fc5"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 700 28px Arial, sans-serif; fill: #f5ddeb; }
      .caption { font: 500 18px Arial, sans-serif; fill: #a393aa; }
      .small { font: 600 14px Arial, sans-serif; fill: #817487; }
      .icon { fill: none; stroke: currentColor; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="#05050b"/>
  <text x="64" y="58" class="label">Sidebar Controls - Simple Visual Draft</text>
  <text x="64" y="88" class="caption">Before keeps the old compact switch-card feel. After centers each control as a cleaner icon button and removes the top-left expand arrow.</text>

  <g transform="translate(64 124)">
    <rect width="552" height="532" rx="22" fill="url(#bg)" stroke="#402135" filter="url(#cardShadow)"/>
    <text x="32" y="48" class="label">Before</text>
    <text x="32" y="76" class="caption">Current look: off-center, card-like controls</text>

    <rect x="32" y="108" width="56" height="386" rx="18" fill="#1d0b1b" stroke="#392136"/>
    <rect x="46" y="124" width="28" height="28" rx="7" fill="#65edf0" filter="url(#softGlow)"/>

    <g transform="translate(43 184)">
      <rect x="-2" y="-10" width="34" height="52" rx="10" fill="#291b2f" stroke="#4b2945"/>
      <path class="icon" style="color:#f3e5ef" d="M7 8h18M16 8v23M8 21l8-13 8 13"/>
    </g>
    <g transform="translate(43 248)">
      <rect x="-2" y="-10" width="34" height="52" rx="10" fill="#291b2f" stroke="#4b2945"/>
      <path class="icon" style="color:#f3e5ef" d="M16 8v16M9 15c0 8 14 8 14 0M10 31h12M16 31v7"/>
    </g>
    <g transform="translate(43 312)">
      <rect x="-2" y="-10" width="34" height="52" rx="10" fill="#291b2f" stroke="#4b2945"/>
      <path class="icon" style="color:#f3e5ef" d="M7 24v-5a9 9 0 0 1 18 0v5M7 24v8M25 24v8"/>
    </g>
    <g transform="translate(43 376)">
      <rect x="-2" y="-10" width="34" height="52" rx="10" fill="#291b2f" stroke="#4b2945"/>
      <path class="icon" style="color:#f3e5ef" d="M9 12h14v18H9zM13 8h6M13 34h6"/>
    </g>

    <rect x="100" y="108" width="420" height="32" rx="11" fill="#24172d" stroke="#45304d"/>
    <rect x="112" y="151" width="390" height="343" rx="16" fill="#131321" stroke="#3b2235"/>
    <rect x="100" y="108" width="18" height="32" fill="#101018"/>
    <path d="M106 116l8 8-8 8" fill="none" stroke="#b6b4c9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="134" y="130" class="small">Expand arrow still visible</text>

    <line x1="64" y1="210" x2="122" y2="210" stroke="#ff77b8" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="132" y="216" class="small">Buttons feel narrow and not visually centered</text>
  </g>

  <g transform="translate(664 124)">
    <rect width="552" height="532" rx="22" fill="url(#bg)" stroke="#402135" filter="url(#cardShadow)"/>
    <text x="32" y="48" class="label">After</text>
    <text x="32" y="76" class="caption">Proposed: centered icon buttons, no expand arrow</text>

    <rect x="32" y="108" width="56" height="386" rx="18" fill="#1d0b1b" stroke="#392136"/>
    <rect x="46" y="124" width="28" height="28" rx="7" fill="#65edf0" filter="url(#softGlow)"/>

    <g transform="translate(42 181)">
      <rect width="36" height="36" rx="9" fill="rgba(255,95,163,0.22)" stroke="#ff6dad" filter="url(#softGlow)"/>
      <path class="icon" style="color:#ffffff" d="M9 10h18M18 10v18M10 22l8-12 8 12"/>
      <rect x="39" y="8" width="3" height="20" rx="2" fill="url(#accent)"/>
    </g>
    <g transform="translate(42 241)">
      <rect width="36" height="36" rx="9" fill="#271b2d" stroke="#4d3047"/>
      <path class="icon" style="color:#d7cada" d="M18 9v13M11 16c0 7 14 7 14 0M12 27h12M18 27v5"/>
    </g>
    <g transform="translate(42 301)">
      <rect width="36" height="36" rx="9" fill="#271b2d" stroke="#4d3047"/>
      <path class="icon" style="color:#d7cada" d="M9 22v-4a9 9 0 0 1 18 0v4M9 22v7M27 22v7"/>
    </g>
    <g transform="translate(42 361)">
      <rect width="36" height="36" rx="9" fill="#271b2d" stroke="#4d3047"/>
      <path class="icon" style="color:#d7cada" d="M11 10h14v17H11zM15 7h6M15 31h6"/>
    </g>

    <rect x="100" y="108" width="420" height="32" rx="11" fill="#24172d" stroke="#45304d"/>
    <text x="120" y="130" class="small">Top bar starts cleanly after logo area</text>
    <rect x="112" y="151" width="390" height="343" rx="16" fill="#131321" stroke="#3b2235"/>

    <line x1="60" y1="199" x2="60" y2="397" stroke="#65edf0" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="132" y="216" class="small">Controls are centered in the sidebar column</text>
    <text x="132" y="242" class="small">Active state still has a clear pink glow</text>
    <text x="132" y="268" class="small">No arrow button beside the logo/top bar</text>
  </g>
</svg>
